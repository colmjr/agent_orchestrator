models:
  feature: anthropic/claude-opus-4-6
  planning: anthropic/claude-opus-4-6
  clarify: anthropic/claude-opus-4-6
  implement: anthropic/claude-opus-4-6
  configure: anthropic/claude-opus-4-6
  refactor: openai/codex-5.3
  review: anthropic/claude-opus-4-6
branching:
  prefix: feat
  separator: /
pr:
  draft: false
  base_branch: main
notifications:
  terminal_bell: true
  stdout: true
tests:
  command: npm test
  coverage: true
orchestrator:
  todo_file: TODO.md
  max_retries: 2
  require_tests_pass: true
  plan_approval: true
  plan_quality_check: true
  plan_quality_mode: balanced
  plan_quality_retries: 2
  auto_clear_context_on_bad_plan: true
  plan_offtopic_keywords:
  - history of chess
  - chess essay
  - 500-word
  - 500 word
  - essay
  - poem
  - trivia
editor:
  vim_mode: true
ui:
  input_height: 8
theme:
  preset: nord
  accent: '#88C0D0'
  success: '#A3BE8C'
  error: '#BF616A'
  warning: '#EBCB8B'
  info: '#81A1C1'
  muted: '#4C566A'
